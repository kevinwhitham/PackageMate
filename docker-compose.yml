services:
  packagemate-server:
    build:
      context: api_server
      dockerfile: Dockerfile
    image: packagemate-server
    container_name: packagemate-server
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGO_USERNAME=$MONGO_USERNAME
      - MONGO_PASSWORD=$MONGO_PASSWORD
      - MONGO_HOSTNAME=packagemate-db
      - MONGO_PORT=$MONGO_PORT
      - MONGO_DB=$MONGO_DB 
      - UPS_ACCESS_KEY=$UPS_ACCESS_KEY
      - USPS_USERNAME=$USPS_USERNAME
    # this will work as long as you haven't changed the mongodb port from the default
    # if you have, change it here as well
    command: ./wait-for.sh packagemate-db:27017 -- npm start

  packagemate-client:
    build:
      context: client
      dockerfile: Dockerfile
    image: packagemate-client
    container_name: packagemate-client
    restart: unless-stopped
    env_file: .env
    depends_on: 
      - packagemate-server
      - db
    environment:
      - MONGO_USERNAME=$MONGO_USERNAME
      - MONGO_PASSWORD=$MONGO_PASSWORD
      - MONGO_HOSTNAME=packagemate-db
      - MONGO_PORT=$MONGO_PORT
      - MONGO_DB=$MONGO_DB 
      - UPS_ACCESS_KEY=$UPS_ACCESS_KEY
      - USPS_USERNAME=$USPS_USERNAME
    ports:
      # this is the port of the main app, by default, port 80 is
      # exposed on the host machine (localhost or 127.0.0.1)
      - "8484:3000"
    command: npm start
    stdin_open: true
  
  db:
    image: mongo:4.1.8-xenial
    container_name: packagemate-db
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGO_INITDB_ROOT_USERNAME=$MONGO_USERNAME
      - MONGO_INITDB_ROOT_PASSWORD=$MONGO_PASSWORD
    volumes:  
      - ./packagemate-dbdata:/data/db   

